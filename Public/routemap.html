<!DOCTYPE html>
<html lang="en">
<head>
    <title>Tracking Bus - Where is my Bus?</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            font-family: system-ui, -apple-system, sans-serif;
            background: #f3f4f6;
        }

        #map {
            height: 100vh;
            width: 100%;
        }

        .header {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            z-index: 1000;
            background: white;
            padding: 12px 16px;
            border-radius: 14px;
            box-shadow: 0 6px 25px rgba(0, 0, 0, 0.15);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .bus-info {
            font-weight: 700;
            font-size: 1.2rem;
        }

        .status {
            color: #10b981;
            font-size: 0.9rem;
        }

        .back-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        .back-btn:hover {
            background: #dc2626;
        }

        .no-data {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #555;
            background: white;
            padding: 25px;
            border-radius: 14px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
            width: 90%;
            max-width: 320px;
        }

        /* 📱 Mobile Responsive */
        @media (max-width: 600px) {
            .header {
                flex-direction: column;
                align-items: flex-start;
            }

            .back-btn {
                width: 100%;
                text-align: center;
            }

            .bus-info {
                font-size: 1rem;
            }

            .status {
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>

<div id="map"></div>

<div class="header">
    <button class="back-btn" onclick="window.location.href='/'">← Back</button>
    <div>
        <div class="bus-info" id="busInfo">BUS001</div>
        <div class="status" id="status">Waiting for GPS...</div>
    </div>
</div>

<div id="noData" class="no-data">
    🔍 Bus location will appear here <br>
    <small>Driver must have tracking active</small>
</div>

<!-- Firebase -->
<script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
    import { getDatabase, ref, onValue } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

    const firebaseConfig = {
        apiKey: "AIzaSyBIfqL2iOksHYZlboVQ3q1iU-DO2sTCJrY",
        authDomain: "whereismybus-ebe42.firebaseapp.com",
        databaseURL: "https://whereismybus-ebe42-default-rtdb.firebaseio.com",
        projectId: "whereismybus-ebe42",
        storageBucket: "whereismybus-ebe42.firebasestorage.app",
        messagingSenderId: "683775175774",
        appId: "1:683775175774:web:dc47e18df198232a2058cf"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Get Bus ID from URL
    const urlParams = new URLSearchParams(window.location.search);
    const busId = urlParams.get('bus')?.toUpperCase() || 'BUS001';
    document.getElementById('busInfo').textContent = busId;

    // Initialize Map
    const map = L.map('map').setView([17.385044, 78.486671], 13); // Hyderabad default

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    let marker;
    const busRef = ref(db, `buses/${busId}`);

    onValue(busRef, (snapshot) => {
        const data = snapshot.val();

        if (!data || data.latitude == null || data.longitude == null) {
            document.getElementById('status').textContent = 'No live location';
            document.getElementById('noData').style.display = 'block';
            return;
        }

        document.getElementById('noData').style.display = 'none';

        const position = [data.latitude, data.longitude];

        document.getElementById('status').textContent =
            `Updated: ${data.timestamp ? new Date(data.timestamp).toLocaleTimeString() : 'Live'}`;

        if (marker) {
            marker.setLatLng(position);
        } else {
            marker = L.marker(position)
                .addTo(map)
                .bindPopup(`<b>${busId}</b>`);
        }

        map.flyTo(position, 16, { duration: 1.2 });
    });

    // Fix map resize issue on mobile
    window.addEventListener("resize", () => {
        setTimeout(() => {
            map.invalidateSize();
        }, 200);
    });
</script>
</body>
</html>
