<!DOCTYPE html>
<html>

<head>
    <title>Bus Driver - Live Tracker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: system-ui;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            background: white;
            color: #333;
            width: 100%;
            max-width: 420px;
            padding: 30px 25px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        h1 {
            margin-top: 0;
            font-size: 1.6rem;
        }

        p {
            font-size: 0.95rem;
            color: #666;
        }

        input {
            width: 100%;
            padding: 14px;
            font-size: 1rem;
            border: 2px solid #ddd;
            border-radius: 12px;
            margin: 15px 0;
            outline: none;
        }

        input:focus {
            border-color: #10b981;
        }

        button {
            width: 100%;
            padding: 16px;
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
        }

        button.active {
            background: #10b981;
        }

        #status {
            font-size: 0.95rem;
            margin: 15px 0;
            min-height: 24px;
        }

        #coords {
            font-size: 0.85rem;
            color: #666;
            word-wrap: break-word;
        }

        /* 📱 Small devices */
        @media (max-width: 480px) {
            .card {
                padding: 20px;
                border-radius: 15px;
            }

            h1 {
                font-size: 1.4rem;
            }

            button {
                padding: 14px;
            }
        }
    </style>
</head>

<body>

    <div class="card">
        <h1>🚌 Bus Driver Tracker</h1>
        <p>Keep screen ON for live tracking</p>

        <input id="busId" placeholder="Enter Bus ID (BUS001)" maxlength="10">
        <button id="startBtn">Start Tracking</button>

        <div id="status">Ready to track</div>
        <div id="coords">Waiting for GPS...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBIfqL2iOksHYZlboVQ3q1iU-DO2sTCJrY",
            authDomain: "whereismybus-ebe42.firebaseapp.com",
            databaseURL: "https://whereismybus-ebe42-default-rtdb.firebaseio.com",
            projectId: "whereismybus-ebe42",
            storageBucket: "whereismybus-ebe42.firebasestorage.app",
            messagingSenderId: "683775175774",
            appId: "1:683775175774:web:dc47e18df198232a2058cf",
            measurementId: "G-SCMYG4ZR4V"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const busIdInput = document.getElementById("busId");
        const startBtn = document.getElementById("startBtn");
        const status = document.getElementById("status");
        const coords = document.getElementById("coords");

        let watchId = null;
        let tracking = false;

        startBtn.addEventListener("click", () => {

            const busId = busIdInput.value.trim().toUpperCase();

            if (!busId) {
                alert("Please enter Bus ID");
                return;
            }

            if (!tracking) {

                watchId = navigator.geolocation.watchPosition(
                    async (position) => {

                        const data = {
                            latitude: position.coords.latitude,
                            longitude: position.coords.longitude,
                            accuracy: position.coords.accuracy,
                            timestamp: Date.now()
                        };

                        await set(ref(db, "buses/" + busId), data);

                        coords.textContent =
                            "📍 " +
                            data.latitude.toFixed(5) +
                            ", " +
                            data.longitude.toFixed(5);

                        status.textContent =
                            "✅ Live - " +
                            new Date().toLocaleTimeString();
                    },
                    (error) => {
                        status.textContent = "❌ GPS Error: " + error.message;
                    },
                    {
                        enableHighAccuracy: true,
                        maximumAge: 5000,
                        timeout: 10000
                    }
                );

                tracking = true;
                startBtn.textContent = "Stop Tracking";
                startBtn.classList.add("active");

            } else {

                navigator.geolocation.clearWatch(watchId);
                tracking = false;

                startBtn.textContent = "Start Tracking";
                startBtn.classList.remove("active");
                status.textContent = "⛔ Tracking Stopped";
            }
        });
    </script>

</body>

</html>
